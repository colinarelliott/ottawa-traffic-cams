<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Traffic Cams - Ottawa</title>
    <!--
      The __onGCastApiAvailable callback MUST be defined before the SDK script
      executes. Setting it here (synchronously in the HTML) guarantees it's in
      place regardless of when the React app mounts and runs its effects.
    -->
    <script>
      window.__onGCastApiAvailable = function(isAvailable) {
        window.__castApiAvailable = isAvailable;
        if (typeof window.__castApiReadyCb === "function") {
          window.__castApiReadyCb(isAvailable);
        }
      };
    </script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
